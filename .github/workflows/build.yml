name: Regenerate site pages from spreadsheet

on:
  push:
    branches: [main]
    paths:
      - 'convos.xlsx'
      - 'generate_pages.py'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Regenerate pages
        run: python generate_pages.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "convo-bot"
          git config user.email "convo-bot@users.noreply.github.com"
          git add *.html
          if git diff --staged --quiet; then
            echo "No HTML changes — nothing to commit."
          else
            git commit -m "Auto-regenerate pages from convos.xlsx"
            git push
          fi
